<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Green Valley Farms | Under Construction</title>
  <style>
    :root {
      --bg: #f4f8f1;
      --card: #ffffff;
      --text: #1f3b1f;
      --muted: #4d6a4d;
      --track: #dce8d6;
      --fill: #4c9b3f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .container {
      width: min(92vw, 560px);
      background: var(--card);
      border: 1px solid #e7eee3;
      border-radius: 14px;
      padding: 2rem;
      box-shadow: 0 12px 30px rgba(31, 59, 31, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 0.6rem;
      font-size: clamp(1.35rem, 2.8vw, 2rem);
    }

    p {
      margin: 0 0 1.2rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .progress-track {
      width: 100%;
      height: 14px;
      border-radius: 999px;
      background: var(--track);
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: var(--fill);
      transition: width 100ms linear;
    }

    .progress-text {
      margin-top: 0.75rem;
      font-weight: 600;
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="container" aria-live="polite">
    <h1>Green Valley Farms</h1>
    <p>Our website is under construction. We’ll be online soon with fresh updates from the farm.</p>

    <div class="progress-track" role="progressbar" aria-label="Page loading progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">0%</div>
  </main>

  <script>
    (function () {
      const totalDurationMs = 10000;
      const stepMs = 100;
      const totalSteps = totalDurationMs / stepMs;
      let currentStep = 0;

      const fill = document.getElementById('progressFill');
      const text = document.getElementById('progressText');
      const bar = document.querySelector('[role="progressbar"]');

      const timer = setInterval(function () {
        currentStep += 1;
        const progress = Math.min(100, Math.round((currentStep / totalSteps) * 100));

        fill.style.width = progress + '%';
        text.textContent = progress + '%';
        bar.setAttribute('aria-valuenow', String(progress));

        if (progress >= 100) {
          clearInterval(timer);
        }
      }, stepMs);
    })();
  </script>
</body>
</html>
